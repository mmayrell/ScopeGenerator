name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two production deploys at once; a newer push supersedes a queued one.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  api:
    name: Deploy Function App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json
      - name: Build
        working-directory: api
        run: |
          npm ci
          npm run build
      - name: Stage deployment package (dist + prod dependencies only)
        run: |
          mkdir staging
          cp api/host.json api/package.json api/package-lock.json staging/
          cp -r api/dist staging/dist
          cp -r api/assets staging/assets
          cd staging && npm ci --omit=dev
      - name: Deploy
        uses: Azure/functions-action@v1
        with:
          app-name: scopegen-api-apvgm
          package: staging
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

  web:
    name: Deploy Static Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: |
          npm ci
          npm run build
      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: dist
          skip_app_build: true
          skip_api_build: true
