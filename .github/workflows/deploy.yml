name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two production deploys at once; a newer push supersedes a queued one.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  api:
    name: Deploy Function App
    # MUST be a Windows runner: the target Function App runs Windows, and the
    # backend depends on native modules (@napi-rs/canvas via pdf-to-png-converter)
    # whose binaries are platform-specific. Staging `npm ci` on ubuntu ships Linux
    # binaries, the worker crashes on module load, zero functions register, and
    # every route 404s — exactly the prod outage of 2026-07-05.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json
      - name: Build
        working-directory: api
        shell: pwsh
        run: |
          npm ci
          if ($LASTEXITCODE -ne 0) { exit 1 }
          npm run build
          if ($LASTEXITCODE -ne 0) { exit 1 }
      - name: Stage deployment package (dist + prod dependencies only)
        shell: pwsh
        run: |
          New-Item -ItemType Directory staging | Out-Null
          Copy-Item api/host.json, api/package.json, api/package-lock.json staging/
          Copy-Item -Recurse api/dist staging/dist
          Copy-Item -Recurse api/assets staging/assets
          Set-Location staging
          npm ci --omit=dev
          if ($LASTEXITCODE -ne 0) { exit 1 }
      # Direct Kudu zipdeploy — the same mechanism as `az functionapp deployment
      # source config-zip`, which is proven against this app. (Azure/functions-action
      # with a publish profile mishandles WEBSITE_RUN_FROM_PACKAGE on Windows
      # Consumption apps and previously left the site serving 503s.)
      - name: Deploy (Kudu zipdeploy)
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        shell: pwsh
        run: |
          7z a -bso0 package.zip ".\staging\*"
          # Parse defensively and NEVER echo the profile: a naive `[xml]$env:...`
          # cast that fails prints the entire secret (passwords included) into the
          # public Actions log. Also strip the UTF-8 BOM az sometimes emits, which
          # .NET's XML parser rejects.
          $raw = "$env:PUBLISH_PROFILE".TrimStart([char]0xFEFF).Trim()
          try { $xml = [xml]$raw } catch {
            Write-Host 'ERROR: the AZURE_FUNCTIONAPP_PUBLISH_PROFILE secret is not parseable XML (content not shown). Re-export it with: az functionapp deployment list-publishing-profiles --xml'
            exit 1
          }
          $prof = $xml.publishData.publishProfile | Where-Object { $_.publishMethod -eq 'ZipDeploy' }
          if (-not $prof) { Write-Host 'ERROR: no ZipDeploy profile found in the publish-profile secret'; exit 1 }
          $pair = "$($prof.userName):$($prof.userPWD)"
          Write-Output "::add-mask::$pair"
          $hdr = @{ Authorization = 'Basic ' + [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair)) }
          $scm = 'https://scopegen-api-apvgm.scm.azurewebsites.net'
          $resp = Invoke-WebRequest -Method Post -Uri "$scm/api/zipdeploy?isAsync=true&Deployer=GitHubActions" -Headers $hdr -InFile package.zip -ContentType 'application/zip'
          $loc = $resp.Headers.Location
          if ($loc -is [array]) { $loc = $loc[0] }
          Write-Host "Deployment accepted; polling status"
          for ($i = 0; $i -lt 90; $i++) {
            $d = Invoke-RestMethod -Uri $loc -Headers $hdr
            if ($d.complete) {
              if ($d.status -eq 4) { Write-Host 'Deployment succeeded'; exit 0 }
              Write-Host "Deployment finished with status $($d.status) (expected 4)"
              $d | ConvertTo-Json -Depth 4
              exit 1
            }
            Start-Sleep -Seconds 10
          }
          Write-Host 'Timed out waiting for deployment to complete'
          exit 1
      # A deploy that uploads fine but leaves the app unable to serve (bad native
      # binaries, module-load crash, stripped run-from-package) must FAIL the run.
      - name: Post-deploy health gate
        shell: pwsh
        run: |
          $uri = 'https://scopegen-api-apvgm.azurewebsites.net/api/health'
          for ($i = 0; $i -lt 30; $i++) {
            try {
              $h = Invoke-RestMethod -Uri $uri -TimeoutSec 30
              if ($h.ok) { Write-Host "Health check passed (attempt $($i + 1))"; exit 0 }
            } catch { }
            Start-Sleep -Seconds 10
          }
          Write-Host 'HEALTH CHECK FAILED - the deployed app is not serving /api/health'
          exit 1

  web:
    name: Deploy Static Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: |
          npm ci
          npm run build
      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: dist
          skip_app_build: true
